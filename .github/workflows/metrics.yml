name: Metrics
on:
  schedule: # Run workflow every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual runs
  push:
    branches:
      - main
      - master

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          command -v docker >/dev/null || echo "docker is not available on this runner"

      - name: Verify repository context
        run: |
          pwd
          test -d .git

      - name: Generate metrics
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: salieri009
          template: classic
          base: header, activity, repositories, metadata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          plugin_habits: no
          plugin_achievements: no
          plugin_lines: no
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_stargazers: no
          plugin_repositories: yes
          config_timezone: Asia/Seoul
          filename: metrics.svg

      - name: Generate extended metrics (optional)
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: salieri009
          template: classic
          base: header, activity, repositories, metadata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          plugin_habits: no
          plugin_achievements: no
          plugin_lines: no
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_stargazers: no
          plugin_repositories: yes
          config_timezone: Asia/Seoul
          filename: metrics.full.svg

      - name: Generate safe extended metrics fallback
        if: ${{ hashFiles('metrics.full.svg') == '' }}
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: salieri009
          template: classic
          base: header, activity, repositories, metadata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          # Disable unstable plugins to avoid null/undefined GraphQL and template rendering errors.
          plugin_habits: no
          plugin_achievements: no
          plugin_lines: no
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_stargazers: no
          plugin_repositories: yes
          config_timezone: Asia/Seoul
          filename: metrics.full.svg

      - name: Use extended metrics when available
        run: |
          if [ -s metrics.full.svg ]; then
            mv metrics.full.svg metrics.svg
          fi

      - name: Ensure metrics output exists
        run: |
          if [ ! -s metrics.svg ]; then
            printf '%s\n' \
              '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" role="img" aria-label="Metrics unavailable">' \
              '  <rect width="100%" height="100%" fill="#0d1117"/>' \
              '  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="20">Metrics temporarily unavailable</text>' \
              '</svg>' > metrics.svg
          fi

      - name: Commit metrics
        working-directory: ${{ github.workspace }}
        run: |
          test -d .git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Stage all generated metric artifacts to avoid unstaged-change rebase failures.
          git add -A *.svg
          if git diff --staged --quiet; then
            echo "No metrics changes to commit"
            exit 0
          fi

          git commit -m "Update metrics"
          BRANCH="${GITHUB_REF_NAME:-${GITHUB_REF#refs/heads/}}"

          # Retry to handle races with other workflow runs updating the same branch.
          for attempt in 1 2 3; do
            git fetch origin "$BRANCH"
            git rebase --autostash "origin/$BRANCH"

            if git push origin "HEAD:$BRANCH"; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi

            echo "Push failed on attempt $attempt; retrying..."
            sleep $((attempt * 5))
          done

          echo "Push failed after 3 attempts"
          exit 1

